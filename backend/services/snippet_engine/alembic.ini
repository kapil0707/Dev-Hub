# =============================================================================
# Alembic Configuration — Snippet Engine
# =============================================================================
# Same pattern as Identity Service. URL is set dynamically in alembic/env.py.
#
# USAGE:
#   alembic revision --autogenerate -m "create snippets table"
#   alembic upgrade head
#   alembic downgrade -1
# =============================================================================

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sqlalchemy.url is set dynamically in env.py (not here)

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
