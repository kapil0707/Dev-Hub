# =============================================================================
# Alembic Configuration — Automation Worker
# =============================================================================

[alembic]
# Path to the alembic migration scripts directory (relative to this file)
script_location = alembic

# File naming: timestamp_description.py  e.g. 20240312_001_create_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# =============================================================================
# IMPORTANT: We do NOT set sqlalchemy.url here because we use an ASYNC driver
# (asyncpg). The URL is loaded dynamically in alembic/env.py from the .env file.
# If you set it here, Alembic would use the sync driver and break.
# =============================================================================
# sqlalchemy.url = (intentionally left blank — set in env.py)

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
