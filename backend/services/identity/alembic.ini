# =============================================================================
# Alembic Configuration — Identity Service
# =============================================================================
# PURPOSE: Alembic uses this file to know:
#   1. Where the migration scripts live (script_location)
#   2. How to connect to the database (sqlalchemy.url)
#   3. How to format generated migration files
#
# WHAT IS ALEMBIC?
#   Alembic is to your database what Git is to your code.
#   Every schema change (add column, rename table, add index) becomes a
#   "revision" — a versioned migration file. Running `alembic upgrade head`
#   applies ALL pending migrations in order.
#
#   This means:
#   - You never ALTER the database manually — always through a migration
#   - Any developer can recreate the exact same schema from scratch
#   - You can roll back a bad migration with `alembic downgrade -1`
#
# USAGE:
#   alembic revision --autogenerate -m "create users table"  → generate migration
#   alembic upgrade head                                       → apply all migrations
#   alembic downgrade -1                                       → undo last migration
#   alembic history                                            → list all migrations
# =============================================================================

[alembic]
# Path to the alembic migration scripts directory (relative to this file)
script_location = alembic

# File naming: timestamp_description.py  e.g. 20240312_001_create_users_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# =============================================================================
# IMPORTANT: We do NOT set sqlalchemy.url here because we use an ASYNC driver
# (asyncpg). The URL is loaded dynamically in alembic/env.py from the .env file.
# If you set it here, Alembic would use the sync driver and break.
# =============================================================================
# sqlalchemy.url = (intentionally left blank — set in env.py)

[post_write_hooks]
# Uncomment to auto-format generated migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
