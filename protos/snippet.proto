// =============================================================================
// snippet.proto — gRPC Service Contract for Code Snippets
// =============================================================================
//
// WHAT IS THIS FILE?
//   A Protocol Buffer (protobuf) definition that serves TWO purposes:
//   1. Defines the MESSAGE SHAPES (like TypeScript interfaces or C++ structs)
//   2. Defines the SERVICE (like a C++ abstract class with virtual methods)
//
// COMPILATION:
//   python -m grpc_tools.protoc \
//     --python_out=./generated --grpc_python_out=./generated \
//     -I../../protos ../../protos/snippet.proto
//
//   This generates:
//     snippet_pb2.py       — message classes (Snippet, CreateSnippetRequest, etc.)
//     snippet_pb2_grpc.py  — server/client stubs (SnippetServiceServicer, SnippetServiceStub)
//
// C++ ANALOGY:
//   .proto file     ≈  .h header file     (defines the interface)
//   _pb2.py         ≈  compiled .o file    (message serialization)
//   _pb2_grpc.py    ≈  virtual base class  (you implement the methods)
// =============================================================================

syntax = "proto3";

package devhub.snippets;

// =============================================================================
// Messages — the data shapes sent over the wire
// =============================================================================

// A single code snippet (returned from server)
message Snippet {
  string id         = 1;    // UUID as string
  string user_id    = 2;    // Owner's UUID
  string title      = 3;
  string language   = 4;    // e.g. "python", "javascript", "bash"
  string code       = 5;    // The actual code content
  repeated string tags = 6; // Array of tag strings
  string created_at = 7;    // ISO 8601 timestamp
  string updated_at = 8;    // ISO 8601 timestamp
}

// Request to create a new snippet
message CreateSnippetRequest {
  string user_id    = 1;    // Set by BFF from JWT (not by the user)
  string title      = 2;
  string language   = 3;
  string code       = 4;
  repeated string tags = 5;
}

// Request to update an existing snippet
message UpdateSnippetRequest {
  string id         = 1;    // Which snippet to update
  string user_id    = 2;    // Must match the owner (authorization)
  string title      = 3;
  string language   = 4;
  string code       = 5;
  repeated string tags = 6;
}

// Request a single snippet by ID
message SnippetId {
  string id      = 1;
  string user_id = 2;  // For authorization: only owner can access
}

// Filter for listing snippets
message ListSnippetsRequest {
  string user_id          = 1;  // Required: whose snippets
  string language_filter  = 2;  // Optional: filter by language
  string tag_filter       = 3;  // Optional: filter by tag
  string search_query     = 4;  // Optional: search in title
}

// Response containing multiple snippets
message SnippetList {
  repeated Snippet snippets = 1;
  int32 total_count         = 2;
}

// Generic empty response (for delete)
message Empty {}

// =============================================================================
// Service — the RPC methods (like a C++ class with virtual functions)
// =============================================================================
service SnippetService {
  // Create a new code snippet
  rpc CreateSnippet (CreateSnippetRequest) returns (Snippet);

  // Get a single snippet by ID
  rpc GetSnippet (SnippetId) returns (Snippet);

  // List all snippets for a user (with optional filtering)
  rpc ListSnippets (ListSnippetsRequest) returns (SnippetList);

  // Update an existing snippet
  rpc UpdateSnippet (UpdateSnippetRequest) returns (Snippet);

  // Delete a snippet by ID
  rpc DeleteSnippet (SnippetId) returns (Empty);
}
